name: Scheduled Publish

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Publish scheduled articles
        id: publish
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          echo "Today: $TODAY"
          CHANGED=false

          for file in articles/*.md; do
            [ -f "$file" ] || continue

            PUBLISH_DATE=$(grep -m1 '^publish_date:' "$file" | sed 's/publish_date: *//;s/"//g;s/ //g')
            [ -z "$PUBLISH_DATE" ] && continue

            grep -q '^published: false' "$file" || continue

            if [ "$PUBLISH_DATE" \< "$TODAY" ] || [ "$PUBLISH_DATE" = "$TODAY" ]; then
              echo "Publishing: $file (date: $PUBLISH_DATE)"
              sed -i 's/^published: false/published: true/' "$file"
              sed -i '/^publish_date:/d' "$file"
              CHANGED=true
            else
              echo "Skipping: $file (date: $PUBLISH_DATE > $TODAY)"
            fi
          done

          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.publish.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/*.md
          git diff --cached --quiet && exit 0
          git commit -m "Scheduled publish: $(TZ=Asia/Tokyo date +%Y-%m-%d)"
          git push
